<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Project Hail Mary - Forward Propulsion</title>
    <style>
        body { margin: 0; overflow: hidden; background: #010002; touch-action: none; font-family: 'Courier New', monospace; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        /* The Hail Mary Ship Nose Cone Overdrive */
        #ship-view {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 60vh;
            pointer-events: none; opacity: 0.95;
            z-index: 10;
        }

        #cockpit-hud {
            position: absolute; bottom: 20px; left: 20px;
            color: #00ffff; font-size: 10px; letter-spacing: 2px;
            text-transform: uppercase; text-shadow: 0 0 10px #00ffff;
            pointer-events: none; z-index: 11;
        }

        /* Controls */
        #controls {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: center; z-index: 12;
        }

        button {
            pointer-events: auto;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00cccc;
            color: #00ffff;
            padding: 10px 20px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
            transition: 0.2s;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        button:active { background: #00ffff; color: #000; }
    </style>
</head>
<body>
    <div id="controls">
        <button onclick="changeSpeed(1)">Decrease Boost</button>
        <button onclick="changeSpeed(2.5)">Boost (Petrova Wave)</button>
    </div>
    
    <canvas id="c"></canvas>
    
    <div id="cockpit-hud">
        VESSEL: HAIL MARY [MISSION STATUS: Eridian Sector]<br>
        PROPULSION: Spin-Drive Active [ASTROPHAGE DENSITY: HIGH]<br>
        COMMUNICATION: Blip-A Confirmed 🎵<br>
        CREW STATUS: R. Grace [STABLE]
    </div>

    <svg id="ship-view" viewBox="0 0 1000 600" preserveAspectRatio="none">
        <path d="M0,600 C0,400 300,300 500,300 C700,300 1000,400 1000,600 L0,600 Z" fill="#20232e" stroke="#00ffff" stroke-width="0.5"/>
        <ellipse cx="500" cy="330" rx="300" ry="10" fill="#00ffff" filter="blur(8px)" opacity="0.3"/>
        <line x1="200" y1="330" x2="800" y2="330" stroke="#00ffff" stroke-width="0.5"/>
        <circle cx="200" cy="500" r="2" fill="#333"/>
        <circle cx="800" cy="500" r="2" fill="#333"/>
    </svg>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let numParticles = 800;
        let globalSpeed = 1; // Default "Cruise" speed

        // Shades of "Astrophage" - varying reds and pinks
        const colors = ['#5a000c', '#8e001f', '#ff0033', '#ff33aa', '#ff00ff'];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Place perspective center at middle, slightly higher ( horizon )
            ctx.translate(canvas.width / 2, canvas.height / 3);
        }
        window.addEventListener('resize', resize);
        resize(); // Initial call needs context, subsequent use will use translate again.

        class Astrophage {
            constructor() {
                this.init(true); // Initial setup
            }

            init(firstTime) {
                // Cartesian coordinates (X, Y, Z depth)
                this.x = (Math.random() - 0.5) * canvas.width * 2;
                this.y = (Math.random() - 0.5) * canvas.height * 2;
                this.z = firstTime ? Math.random() * canvas.width : canvas.width;

                // Parallax depth color/size
                this.baseColor = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                // Move toward the viewer (decrease Z)
                this.z -= 4 * globalSpeed; // Propulsion speed

                // If particle is "behind" us, reset it to the "front" (far horizon)
                if (this.z < 1) {
                    this.init(false);
                }
            }

            draw() {
                // Convert 3D Cartesian coordinates to 2D screen view (Perspective Projection)
                let fov = canvas.width / 1.8;
                let sx = this.x * (fov / this.z);
                let sy = this.y * (fov / this.z);
                let ssize = (fov / this.z) * 0.8; // Objects grow as they approach

                // Fade colors based on depth (Z)
                let opacity = (canvas.width - this.z) / canvas.width;
                if (this.z > canvas.width * 0.8) opacity *= 0.2; // Fade in far horizon

                ctx.fillStyle = this.baseColor;
                ctx.globalAlpha = opacity;
                
                // Glow effect (Mobile friendly shadow)
                ctx.shadowBlur = this.z < canvas.width * 0.4 ? 15 : 5; // Closer = wider glow
                ctx.shadowColor = this.baseColor;

                ctx.beginPath();
                ctx.arc(sx, sy, ssize, 0, Math.PI * 2);
                ctx.fill();

                // Solid Core (No glow)
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(sx, sy, ssize * 0.3, 0, Math.PI * 2);
                ctx.fill();

                ctx.globalAlpha = 1; // Reset Alpha
            }
        }

        function changeSpeed(val) {
            globalSpeed = val;
        }

        // Global functions for buttons
        window.changeSpeed = changeSpeed;

        function setup() {
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Astrophage());
            }
        }

        function loop() {
            // Dark "fading" background creates the motion blur/light trails
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(1, 0, 5, 0.3)';
            ctx.fillRect(-canvas.width/2, -canvas.height/3, canvas.width, canvas.height); // Correct fill for translate

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(loop);
        }

        setup();
        // Reset translate to match loop function, loop uses translated coordinates
        ctx.setTransform(1, 0, 0, 1, 0, 0); 
        ctx.translate(canvas.width / 2, canvas.height / 3);
        loop();
    </script>
</body>
</html>
