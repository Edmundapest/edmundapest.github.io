<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Petrova Line - Majestic Astrophage</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020005; cursor: crosshair; }
        canvas { display: block; filter: contrast(120%) brightness(110%); }
        #overlay {
            position: absolute; top: 30px; width: 100%; text-align: center;
            color: #ff00ff; font-family: 'Segoe UI', Tahoma, sans-serif;
            letter-spacing: 5px; text-transform: uppercase; pointer-events: none;
            text-shadow: 0 0 20px #ff00ff; opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="overlay">Eridian Contact: Petrova Flow Detected</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null };

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });

        class Astrophage {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.accel = 0.05;
                this.color = Math.random() > 0.5 ? '#ff00ff' : '#00ffff'; // Pink & Cyan mix
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = "#000"; // Solid core
                ctx.fill();
                
                // Outer energy glow
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                let gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 4);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            update() {
                // Swarm Logic: Move toward mouse (Light source)
                if (mouse.x) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 300) {
                        this.vx += dx / 2000;
                        this.vy += dy / 2000;
                    }
                }

                this.x += this.vx;
                this.y += this.vy;

                // Friction to keep it graceful
                this.vx *= 0.99;
                this.vy *= 0.99;

                // Bounce
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
        }

        function createStarfield() {
            for (let i = 0; i < 200; i++) {
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 0.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 400; i++) {
                particles.push(new Astrophage());
            }
        }

        function animate() {
            // This creates the "Energy Trail" effect
            ctx.fillStyle = 'rgba(2, 0, 8, 0.1)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Connect particles with thin light lines if they are close
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 50) {
                        ctx.strokeStyle = `rgba(255, 0, 255, ${1 - distance/50})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
