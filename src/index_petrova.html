<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Hail Mary - Astrophage Effect</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050105; /* Deep space black */
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff66cc;
            font-family: 'Courier New', Courier, monospace;
            pointer-events: none;
            text-shadow: 0 0 10px #ff00ff;
        }
    </style>
</head>
<body>
    <div id="ui">SYSTEM STATUS: ASTROPHAGE DETECTED</div>
    <canvas id="astrophageCanvas"></canvas>

    <script>
        const canvas = document.getElementById('astrophageCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        const particleCount = 150;

        class Astrophage {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                // Astrophage moves fast and chaotic
                this.speedX = (Math.random() - 0.5) * 3;
                this.speedY = (Math.random() - 0.5) * 3;
                this.glow = Math.random() * 20 + 10;
                this.hue = 320; // Pink/Magenta
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Wrap around screen
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;

                // Subtle "pulsing" effect
                this.glow = 15 + Math.sin(Date.now() * 0.005) * 10;
            }

            draw() {
                // The Pink Glow (The energy)
                ctx.shadowBlur = this.glow;
                ctx.shadowColor = `hsla(${this.hue}, 100%, 60%, 0.8)`;
                ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, 0.3)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fill();

                // The Black Core (The actual organism)
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Astrophage());
            }
        }

        function animate() {
            // Slight trail effect
            ctx.fillStyle = 'rgba(5, 1, 5, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        init();
        animate();
    </script>
</body>
</html>
