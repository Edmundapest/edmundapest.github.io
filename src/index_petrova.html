<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel PHM: Astrophage Swarm</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        /* Container forcing integer scaling for crisp pixels */
        #game-container {
            width: 90vmin; height: 90vmin;
            background: #020005; border: 4px solid #333;
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.4);
        }

        canvas { display: block; width: 100%; height: 100%; }

        #pixel-hud {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: #ff3366; font-family: 'Courier New', monospace; font-size: 10px;
            letter-spacing: 1px; text-transform: uppercase; pointer-events: none;
            text-shadow: 2px 2px 0 #000;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="pixel-hud">
            [HAIL MARY: SPIN ACTIVE] 🎵<br>
            ASTROPHAGE DENSITY: [4800]
        </div>
        <canvas id="c"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimizied context

        // Internal Game Resolution (The real pixel count)
        const GAME_W = 160;
        const GAME_H = 160;
        canvas.width = GAME_W;
        canvas.height = GAME_H;

        let particles = [];
        let numParticles = 400; // Adjust for density vs performance

        // 8-Bit "Astrophage" Palette (No transparency, only solid color blocks)
        const pixelColors = [
            '#4a000c', // Deep Crimson (Heavies)
            '#a00018', // Ruby (Workers)
            '#e00028', // Scarlet (Workers)
            '#ff33aa', // Hot Pink (Scouts)
            '#ff00ff'  // Magenta (Scouts/Sparks)
        ];

        class AstrophagePixel {
            constructor() {
                this.init(true); // Initial setup
            }

            init(firstTime) {
                // X position is random
                this.x = Math.floor(Math.random() * GAME_W);
                // Y position starts above screen if not first time
                this.y = firstTime ? Math.floor(Math.random() * GAME_H) : -5;
                this.type = Math.floor(Math.random() * 3); // 0: Scout, 1: Worker, 2: Heavy
                this.phase = Math.random() * Math.PI * 2; // Unique flash starting point
            }

            update() {
                // Movement Speed (Downward for top-down momentum)
                if(this.type === 0) { this.y += 1.5; } // Scouts: Fast
                else if(this.type === 1) { this.y += 0.8; } // Workers: Mid
                else { this.y += 0.3; } // Heavies: Slow drift

                // If particle is off-screen bottom, reset it to top
                if (this.y > GAME_H) {
                    this.init(false);
                }
            }

            draw() {
                // Determine color and flickering based on type
                let colorIndex;
                let flicker = Math.sin(Date.now() * 0.01 + this.phase);

                if(this.type === 0) { colorIndex = 4; } // Scouts
                else if(this.type === 1) { colorIndex = 2; } // Workers
                else { colorIndex = 0; } // Heavies (deepest)

                // Render as simple square blocks (The raw pixels)
                ctx.fillStyle = pixelColors[colorIndex];
                
                // For "majestic" pixel effect, Scouts flicker, Workers/Heavies only draw solid.
                if(this.type === 0 && flicker > 0) {
                    ctx.fillRect(Math.floor(this.x), Math.floor(this.y), 1, 1);
                } else if (this.type > 0) {
                    ctx.fillRect(Math.floor(this.x), Math.floor(this.y), 1, 1);
                }
            }
        }

        // Draw the static Hail Mary ship
        function drawHailMary() {
            const centerX = GAME_W / 2;
            const centerY = GAME_H * 0.7; // Lower center

            // Ship Palette
            const shipDark = '#333';
            const shipLight = '#666';
            const shipDrive = '#00ffff';

            // Nose Cone (8x8 grid centered)
            ctx.fillStyle = shipDark;
            ctx.fillRect(centerX - 4, centerY - 6, 8, 2); // Bulk
            ctx.fillStyle = shipLight;
            ctx.fillRect(centerX - 3, centerY - 10, 6, 2); // Taper
            ctx.fillRect(centerX - 2, centerY - 12, 4, 2); // Point

            // Spin-Drive Glow (The source)
            ctx.fillStyle = shipDrive;
            ctx.fillRect(centerX - 3, centerY - 10, 1, 1);
            ctx.fillRect(centerX + 2, centerY - 10, 1, 1);
        }

        function setup() {
            // High particle count for pixel density: 400
            for (let i = 0; i < numParticles; i++) {
                particles.push(new AstrophagePixel());
            }
        }

        function loop() {
            // Crisp clearing, no alpha fading (which looks anti-aliased)
            ctx.fillStyle = '#020005';
            ctx.fillRect(0, 0, GAME_W, GAME_H);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            drawHailMary();

            requestAnimationFrame(loop);
        }

        setup();
        loop();
    </script>
</body>
</html>
