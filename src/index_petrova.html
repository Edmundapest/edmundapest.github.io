<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mobile Petrova Line</title>
    <style>
        body { margin: 0; overflow: hidden; background: #080005; touch-action: none; }
        canvas { display: block; }
        #label {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            text-align: center; color: #ff3366; font-family: monospace;
            font-size: 10px; letter-spacing: 2px; opacity: 0.6; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="label">TOUCH TO EMIT INFRARED SIGNATURE</div>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let touch = { x: -100, y: -100, active: false };

        // Shades of "Astrophage" - varying reds and pinks
        const colors = ['#4a0000', '#88001b', '#ff0055', '#ff33aa', '#ff0033'];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Mobile Touch Support
        const handleTouch = (e) => {
            touch.active = true;
            touch.x = e.touches ? e.touches[0].clientX : e.clientX;
            touch.y = e.touches ? e.touches[0].clientY : e.clientY;
        };

        window.addEventListener('touchstart', handleTouch);
        window.addEventListener('touchmove', handleTouch);
        window.addEventListener('touchend', () => touch.active = false);
        // Mouse support for desktop testing
        window.addEventListener('mousedown', handleTouch);
        window.addEventListener('mousemove', (e) => { if(e.buttons > 0) handleTouch(e); });
        window.addEventListener('mouseup', () => touch.active = false);

        class Astrophage {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                if (touch.active) {
                    let dx = touch.x - this.x;
                    let dy = touch.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 150) {
                        this.vx += dx / 800; // Drifts toward touch
                        this.vy += dy / 800;
                    }
                }

                this.x += this.vx;
                this.y += this.vy;

                // Wrap boundaries
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;

                // Air resistance
                this.vx *= 0.98;
                this.vy *= 0.98;
            }

            draw() {
                // Glow effect using shadow (Mobile friendly version)
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.fill();
                
                // Solid black core
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function setup() {
            // Lower particle count for mobile performance
            const count = (canvas.width < 600) ? 180 : 280;
            for (let i = 0; i < count; i++) particles.push(new Astrophage());
        }

        function loop() {
            // Dark "fading" background creates the light trails
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(10, 0, 5, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(loop);
        }

        setup();
        loop();
    </script>
</body>
</html>
