<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PHM: Petrova Overdrive</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050002; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        
        #ui {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; flex-direction: column; align-items: center; pointer-events: none;
        }

        button {
            pointer-events: auto;
            background: rgba(255, 0, 80, 0.1);
            border: 1px solid #ff0055;
            color: #ff0055;
            padding: 15px 30px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.2);
            margin-top: 10px;
        }

        button:active { background: #ff0055; color: #fff; transform: scale(0.9); }

        #ship-icon {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 120px;
            filter: drop-shadow(0 0 15px #00ffff);
            pointer-events: none;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <svg id="ship-icon" viewBox="0 0 40 100">
        <path d="M20,5 L35,40 L35,85 L20,95 L5,85 L5,40 Z" fill="#111" stroke="#00ffff" stroke-width="1"/>
        <rect x="18" y="25" width="4" height="6" fill="#00ffff" opacity="0.6"/> </svg>

    <div id="ui">
        <div style="color: #ff0055; font-size: 10px; margin-bottom: 5px; letter-spacing: 2px;">STATUS: STEADY PROPULSION</div>
        <button onclick="scatter()">Scatter Astrophage</button>
    </div>
    
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let touch = { x: -100, y: -100, active: false };

        // The "Petrova" Palette
        const colors = ['#440000', '#88001b', '#ff0044', '#ff4d94', '#ff00ff'];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Touch Interaction
        const handleTouch = (e) => {
            touch.active = true;
            touch.x = e.touches ? e.touches[0].clientX : e.clientX;
            touch.y = e.touches ? e.touches[0].clientY : e.clientY;
        };
        window.addEventListener('touchstart', handleTouch);
        window.addEventListener('touchmove', handleTouch);
        window.addEventListener('touchend', () => touch.active = false);
        window.addEventListener('mousedown', handleTouch);
        window.addEventListener('mousemove', (e) => { if(e.buttons > 0) handleTouch(e); });
        window.addEventListener('mouseup', () => touch.active = false);

        class Astrophage {
            constructor() {
                this.type = Math.random() > 0.8 ? 2 : (Math.random() > 0.5 ? 1 : 0);
                this.init(true);
            }

            init(randomY) {
                this.x = Math.random() * canvas.width;
                this.y = randomY ? Math.random() * canvas.height : -20;
                
                // Layered Speeds (Downwards)
                if(this.type === 0) { // Scouts (Fastest)
                    this.size = Math.random() * 1 + 0.5;
                    this.driftSpeed = 4 + Math.random() * 2;
                    this.color = colors[4];
                } else if(this.type === 1) { // Workers (Mid)
                    this.size = Math.random() * 1.5 + 1;
                    this.driftSpeed = 2 + Math.random() * 1;
                    this.color = colors[2];
                } else { // Heavies (Slowest/Deepest)
                    this.size = Math.random() * 3 + 2;
                    this.driftSpeed = 0.5 + Math.random() * 0.5;
                    this.color = colors[0];
                }

                this.vx = (Math.random() - 0.5) * 1;
                this.vy = this.driftSpeed;
            }

            update() {
                // Constant downward movement
                this.y += this.driftSpeed;

                // Touch Interaction (Heat Attraction)
                if (touch.active) {
                    let dx = touch.x - this.x;
                    let dy = touch.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 250) {
                        this.vx += dx / 1000;
                        this.vy += dy / 1000;
                    }
                }

                this.x += this.vx;
                this.y += this.vy;

                // Air friction to keep it elegant
                this.vx *= 0.98;
                this.vy = (this.vy * 0.9) + (this.driftSpeed * 0.1);

                // Boundary Reset
                if (this.y > canvas.height + 20) this.init(false);
                if (this.x < -20) this.x = canvas.width + 20;
                if (this.x > canvas.width + 20) this.x = -20;
            }

            draw() {
                ctx.shadowBlur = this.type === 0 ? 12 : 5;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                // The "Black Body" core
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function scatter() {
            particles.forEach(p => {
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 20 + 10;
                p.vx = Math.cos(angle) * force;
                p.vy = Math.sin(angle) * force;
            });
        }
        window.scatter = scatter;

        function setup() {
            for (let i = 0; i < 500; i++) {
                particles.push(new Astrophage());
            }
        }

        function loop() {
            ctx.fillStyle = 'rgba(5, 0, 2, 0.25)'; // Trail length
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(loop);
        }

        setup();
        loop();
    </script>
</body>
</html>
